# ─────────────────────────────────────────────────────────────────────────────
# Spring Framework and application log
# ─────────────────────────────────────────────────────────────────────────────
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate SQL logs
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# ─────────────────────────────────────────────────────────────────────────────
# H2 In-Memory Database (default for development/testing)
# Replace with MySQL block below for production
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ─────────────────────────────────────────────────────────────────────────────
# MySQL Database Configuration (uncomment to use MySQL)
# ─────────────────────────────────────────────────────────────────────────────
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
#spring.datasource.username=root
#spring.datasource.password=root
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─────────────────────────────────────────────────────────────────────────────
# Hibernate DDL auto: create | create-drop | update | validate
# ─────────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
